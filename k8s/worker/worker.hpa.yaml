apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: worker-hpa
  namespace: monitoring-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monitoring-worker

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70
