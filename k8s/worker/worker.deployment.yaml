apiVersion: apps/v1
kind: Deployment

metadata:
  name: monitoring-worker
  namespace: monitoring-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: monitoring-worker

  template:
    metadata:
      labels:
        app: monitoring-worker

    spec:
      containers:
        - name: app
          image: monitoring-worker
          imagePullPolicy: Never

          envFrom:
            - configMapRef:
                name: worker-config

            - secretRef:
                name: worker-secret

          resources:
            requests:
              cpu: 200m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi
