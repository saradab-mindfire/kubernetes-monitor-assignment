apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: app-hpa
  namespace: monitoring-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monitoring-app

  minReplicas: 1
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 10
