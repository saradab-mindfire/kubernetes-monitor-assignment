apiVersion: apps/v1
kind: Deployment

metadata:
  name: monitoring-app
  namespace: monitoring-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: monitoring-app

  template:
    metadata:
      labels:
        app: monitoring-app

    spec:
      containers:
        - name: app
          image: monitoring-api
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: app-secret
