apiVersion: apps/v1
kind: Deployment

metadata:
  name: monitoring-app
  namespace: monitoring-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: monitoring-app

  template:
    metadata:
      labels:
        app: monitoring-app

    spec:
      containers:
        - name: app
          image: monitoring-api
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: app-secret

          resources:
            requests:
              cpu: 200m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
