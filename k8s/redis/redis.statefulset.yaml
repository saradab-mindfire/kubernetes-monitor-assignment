apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: redis
  namespace: monitoring-app

spec:
  serviceName: redis-headless
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7

          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD

          ports:
            - containerPort: 6379

          volumeMounts:
            - name: redis-storage
              mountPath: /data

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            periodSeconds: 5
            failureThreshold: 3

  volumeClaimTemplates:
    - metadata:
        name: redis-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 1Gi
