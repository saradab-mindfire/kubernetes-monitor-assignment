apiVersion: v1
kind: ServiceAccount

metadata:
  name: prometheus
  namespace: monitoring-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: prometheus
  namespace: monitoring-app

rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: prometheus
  namespace: monitoring-app

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus

subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring-app
