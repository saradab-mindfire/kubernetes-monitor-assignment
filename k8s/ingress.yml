apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: monitoring-ingress
  namespace: monitoring-app

spec:
  ingressClassName: nginx

  rules:
    - host: api.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: monitoring-app-service #here mention the service name of your app

                port:
                  number: 80
