apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: monitoring-ingress
  namespace: monitoring-app

spec:
  ingressClassName: nginx

  rules:
    - host: api.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: monitoring-app-service

                port:
                  number: 80

    - host: grafana.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: grafana-service

                port:
                  number: 3000

    - host: prometheus.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: prometheus-service

                port:
                  number: 9090
